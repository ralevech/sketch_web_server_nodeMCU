<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>ESP8266 Управление</title>
</head>
<body>
    <div class="container">
        <h1>🚀 Управление ESP8266</h1>
        
        <!-- Группа для пина D4 -->
        <div class="pin-group">
            <h2>
                <span class="pin-badge">D4</span>
                Встроенный светодиод
                <span style="margin-left: auto; font-size: 14px;">GPIO2</span>
            </h2>
            <div class="button-container">
                <button class="btn btn-on" onclick="controlPin('D4', 'on')">ВКЛЮЧИТЬ</button>
                <button class="btn btn-off" onclick="controlPin('D4', 'off')">ВЫКЛЮЧИТЬ</button>
            </div>
        </div>
        
        <!-- Группа для пина D1 -->
        <div class="pin-group">
            <h2>
                <span class="pin-badge">D1</span>
                Внешнее устройство
                <span style="margin-left: auto; font-size: 14px;">GPIO5</span>
            </h2>
            <div class="button-container">
                <button class="btn btn-on" onclick="controlPin('D1', 'on')">ВКЛЮЧИТЬ</button>
                <button class="btn btn-off" onclick="controlPin('D1', 'off')">ВЫКЛЮЧИТЬ</button>
            </div>
        </div>
        
        <div class="status" id="status">
            Статус: <span id="statusText">готов к работе</span>
        </div>
        
        <div class="footer">
            NodeMCU V3 | ESP-12E
        </div>
    </div>
    
    <script>
        function controlPin(pin, action) {
            const statusEl = document.getElementById('statusText');
            statusEl.innerHTML = `отправка команды ${pin} ${action}...`;
            
            fetch(`/${pin}/${action}`)
                .then(response => {
                    if (response.ok) {
                        statusEl.innerHTML = `✅ ${pin} ${action === 'on' ? 'включен' : 'выключен'}`;
                        return response.text();
                    }
                    throw new Error('Ошибка сети');
                })
                .catch(error => {
                    statusEl.innerHTML = '❌ ошибка соединения';
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
